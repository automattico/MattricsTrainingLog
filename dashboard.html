<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
  <script src="config.js"></script>
</head>
<body>

<!-- ── LOADING SCREEN ── -->
<div id="loadScreen">
  <div class="load-logo">Training <em>Mattrics</em></div>
  <div id="loadSpinner" class="load-spinner"></div>
  <div id="loadMsg" class="load-msg">Fetching your data…</div>
  <div class="load-error-box" id="errorBox">
    <div class="load-error-msg" id="errorMsg"></div>
    <button class="retry-btn" onclick="fetchData()">↩ Retry</button>
    <button class="retry-btn" onclick="showSetupHelp()">Setup Instructions</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <header class="site-header">
    <div class="site-title">Training <em>Mattrics</em></div>

    <!-- TIME WINDOW — the primary filter -->
    <div class="window-switcher" id="windowSwitcher">
      <button class="window-btn active" data-days="7"  onclick="setWindow(7,this)">7 days</button>
      <button class="window-btn"        data-days="14" onclick="setWindow(14,this)">14 days</button>
      <button class="window-btn"        data-days="30" onclick="setWindow(30,this)">1 month</button>
      <button class="window-btn"        data-days="0"  onclick="setWindow(0,this)">All time</button>
    </div>

    <div class="header-right">
      <div class="header-stats" id="headerStats"></div>
      <button class="icon-btn" onclick="fetchData()" title="Refresh from sheet" aria-label="Refresh data">↻</button>
    </div>
  </header>

  <!-- Context bar: shows what window is active -->
  <div class="context-bar" id="contextBar"></div>

  <nav class="nav">
    <button class="nav-btn active" onclick="showView('feed',this)">Feed</button>
    <button class="nav-btn" onclick="showView('timeline',this)">Timeline</button>
    <button class="nav-btn" onclick="showView('insights',this)">Insights</button>
    <button class="nav-btn" onclick="showView('ai',this)">AI Workout</button>
  </nav>

  <div class="view active" id="view-feed">
    <div class="filter-row" id="filterRow"></div>
    <div class="cards" id="cardList"></div>
  </div>

  <div class="view" id="view-timeline">
    <div class="tl-switch">
      <button class="tl-sw-btn active" onclick="setGroup('week',this)">Week</button>
      <button class="tl-sw-btn" onclick="setGroup('month',this)">Month</button>
    </div>
    <div id="tlContent"></div>
  </div>

  <div class="view" id="view-insights">
    <div class="insights-grid" id="insightsGrid"></div>
  </div>

  <div class="view" id="view-ai">
    <div class="ai-pane">
      <div class="ai-head">Today's <em>Workout</em></div>
      <div class="ai-desc" id="aiDesc"></div>
      <div class="api-note">
        Open this HTML file in a text editor and replace <code>YOUR_API_KEY_HERE</code> with your key from
        <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
      </div>
      <div class="recent-preview" id="recentPreview">
        <div class="rp-label">Last 10 days</div>
        <div id="recentItems"></div>
      </div>
      <button class="gen-btn" onclick="generateWorkout()">Generate Workout</button>
      <div class="ai-thinking" id="aiThinking">Thinking…</div>
      <div class="ai-output" id="aiOutput">
        <div class="ai-output-label">✦ Recommended Session</div>
        <div class="ai-output-text" id="aiText"></div>
      </div>
    </div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle" onclick="event.stopPropagation()">
    <div class="detail-head">
      <div>
        <div class="detail-kicker" id="detailKicker"></div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-date" id="detailDate"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()" aria-label="Close session detail">×</button>
    </div>
    <div class="detail-body">
      <div class="detail-metrics" id="detailMetrics"></div>
      <div class="detail-section" id="detailFactsSection">
        <div class="detail-label">Session stats</div>
        <div class="detail-facts" id="detailFacts"></div>
      </div>
      <div class="detail-section" id="detailWorkoutSection" style="display:none">
        <div class="detail-label">Workout breakdown</div>
        <div class="hevy-list" id="detailWorkoutList"></div>
      </div>
      <div class="detail-section" id="detailNotesSection" style="display:none">
        <div class="detail-label">Notes</div>
        <div class="detail-note" id="detailNotes"></div>
      </div>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
</body>
</html>
